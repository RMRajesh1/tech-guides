<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="5.5" fill="#07070f"/>
  <!-- Cube: top / right / left faces -->
  <polygon points="16.00,3.50 24.80,8.50 16.00,13.50 7.20,8.50" fill="#f97316"/>
  <polygon points="24.80,8.50 24.80,18.50 16.00,23.50 16.00,13.50" fill="#c34e08"/>
  <polygon points="7.20,8.50 16.00,13.50 16.00,23.50 7.20,18.50" fill="#823205"/>
  <!-- Highlight on top face -->
  <polygon points="15.12,4.00 12.66,5.40 14.86,6.65 16.70,4.90" fill="rgba(255,160,60,.35)"/>
  <!-- Edges -->
  <line x1="16.00" y1="3.50" x2="24.80" y2="8.50" stroke="#05050c" stroke-width="0.75" opacity="0.88"/>
  <line x1="16.00" y1="3.50" x2="7.20" y2="8.50" stroke="#05050c" stroke-width="0.75" opacity="0.88"/>
  <line x1="24.80" y1="8.50" x2="16.00" y2="13.50" stroke="#05050c" stroke-width="0.75" opacity="0.88"/>
  <line x1="7.20" y1="8.50" x2="16.00" y2="13.50" stroke="#05050c" stroke-width="0.75" opacity="0.88"/>
  <line x1="16.00" y1="13.50" x2="16.00" y2="23.50" stroke="#05050c" stroke-width="0.75" opacity="0.88"/>
  <line x1="24.80" y1="8.50" x2="24.80" y2="18.50" stroke="#05050c" stroke-width="0.75" opacity="0.88"/>
  <line x1="7.20" y1="8.50" x2="7.20" y2="18.50" stroke="#05050c" stroke-width="0.75" opacity="0.88"/>
  <line x1="24.80" y1="18.50" x2="16.00" y2="23.50" stroke="#05050c" stroke-width="0.75" opacity="0.88"/>
  <line x1="7.20" y1="18.50" x2="16.00" y2="23.50" stroke="#05050c" stroke-width="0.75" opacity="0.88"/>
  <!-- MCP connection dots -->
  <line x1="12.40" y1="28.2" x2="19.60" y2="28.2" stroke="#f97316" stroke-width="0.65" opacity="0.36"/>
  <circle cx="12.40" cy="28.2" r="1.3" fill="#f97316" opacity="0.60"/>
  <circle cx="16.00"     cy="28.2" r="1.3" fill="#f97316" opacity="0.94"/>
  <circle cx="19.60" cy="28.2" r="1.3" fill="#f97316" opacity="0.60"/>
</svg>